id: bleakwood_depths
name: The Bleakwood Depths
description: "The heart of the cursed forest. Ancient oaks form a canopy so thick that noon looks like dusk. Strange ruins\
  \ \u2014 stones carved with sigils no scholar recognizes \u2014 jut from the earth. The air itself feels hostile. Ghouls\
  \ prowl here, drawn by the curse's necrotic energy. At the center stands the Thornwood Hollow, a collapsed shrine where\
  \ Elder Mora's son made his fateful bargain."
