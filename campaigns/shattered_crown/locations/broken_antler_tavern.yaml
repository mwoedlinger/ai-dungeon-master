name: The Broken Antler Tavern
description: "Low beams, a roaring fire, and the smell of wet wool and woodsmoke. Bram the innkeeper keeps the ale flowing\
  \ and the gossip circulating. A board by the door holds notices \u2014 bounties, job offers, and a faded sketch of a missing\
  \ man. Elder Mora occupies her usual corner table."
