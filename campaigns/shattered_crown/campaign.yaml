title: The Shattered Crown
setting_overview: "The kingdom of Valdris has been without a ruler for three months since King Aldric fell to an assassin's\
  \ blade. Three noble houses vie for the throne while darkness stirs in the Bleakwood. The common folk suffer as trade routes\
  \ grow dangerous and old wards weaken.\n\nThornfield Village sits at the edge of the Bleakwood \u2014 a muddy crossroads\
  \ community of two hundred souls, their livelihood dependent on timber trade that has all but stopped. Strange lights flicker\
  \ in the forest at night. Three woodcutters vanished last month. Elder Mora keeps something from the villagers, and her\
  \ eyes carry the weight of a terrible secret."
starting_location_id: thornfield
