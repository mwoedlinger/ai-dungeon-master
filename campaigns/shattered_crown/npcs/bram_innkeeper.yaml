id: bram_innkeeper
name: Bram
location: broken_antler_tavern
personality: Round-faced, perpetually cheerful, terrible at keeping secrets. Talks constantly. Will tell the party everything
  he knows within ten minutes of meeting them if given ale or a kind word.
goals: Keep his business running, keep his regulars safe, not die. He has a deep, unspoken affection for Elder Mora.
secret: He saw Elder Mora leaving the village at night three weeks ago, heading toward the Bleakwood. He hasn't told anyone.
disposition: friendly
