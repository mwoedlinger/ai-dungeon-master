id: thorvald_militia_captain
name: Captain Thorvald
location: thornfield
personality: Square-jawed, by-the-book, deeply suspicious of outsiders. Respects demonstrated competence. Has twenty militia
  soldiers and is very aware that's not enough.
goals: Keep Thornfield alive until the throne crisis resolves and proper military support arrives. Hates asking for help.
secret: Three of his militia have deserted to the Bleakwood after being 'called' at night. He's told no one.
disposition: neutral
